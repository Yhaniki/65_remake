# 開房間右側面板預設設定 — 放在執行檔同一層，純文字可手改。
# 改完存檔，下次開遊戲生效。
[Room]
# 速度可選清單（逗號分隔，要加/減檔位直接改）
speedSteps=1.0,1.5,2.0,2.5,3.0,4.0,5.0,6.0,8.0
# 預設速度（會對齊到上面最接近的檔位）。玩家在房間選了會寫回這裡
defaultSpeed=4.0
# 預設 note 種類(hit-effect)：-1=隨機，>=0=指定第幾種
defaultNoteType=6
# 預設組隊：0=A 1=B 2=C 3=自由
defaultTeam=3
# 預設掉落方式：0=向上 1=向下 2=傾斜
defaultDropDirection=0
# 預設模式：0=自由模式 1=普通模式 2=ShowTime模式
defaultGameMode=0
# 預設場景：-1=隨機，0..30=指定場景 id（步行街=0 … 卡通公路=30）。玩家在選歌選了會寫回這裡
defaultScene=21

[Option]
# 音量 0.0~1.0（背景音樂 / 遊戲音樂 / 遊戲音效）
opt_bgm=0.683
opt_music=0.5
opt_sfx=0.5
# 4 鍵鍵位（左,下,上,右）主鍵位 / 輔助鍵位（KeyCode 名稱，逗號分隔；空=該格不綁）
opt_keys=A,S,W,D
opt_keysAux=LeftArrow,DownArrow,UpArrow,RightArrow
# 視窗大小 / 顯示模式（Windowed|Fullscreen|Borderless）/ 垂直同步（0|1）/ 語言
opt_dispW=1024
opt_dispH=768
opt_dispMode=Borderless
opt_vsync=1
opt_lang=zh-TW
# 遊戲頁（1=開 0=關）：全屏填滿 / 泛光 / notes面板靠左 / 人物特效 / 場景特效 / 自動導播 / 呼叫卡 / 完奏模式 / 歌曲變速
opt_fullscreenFill=0
opt_bloom=1
opt_notesPanelLeft=1
opt_effectCharacter=1
opt_effectScene=1
opt_cameraAuto=1
opt_callCardInGame=1
opt_playFullSong=0
opt_songSpeed=1
# 面板透明度 0.0~1.6
opt_panelOpacity=1.4
